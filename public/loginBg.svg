<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f2f7"/>
    </radialGradient>

    <linearGradient id="redGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1a1a" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#cc0000" stop-opacity="1"/>
      <stop offset="100%" stop-color="#800000" stop-opacity="0.3"/>
    </linearGradient>

    <linearGradient id="redGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff4d4d" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#e60000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0.6"/>
    </linearGradient>

    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#e1e5ec" stroke-width="1" opacity="0.6"/>
    </pattern>

    <filter id="glow-subtle" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glow-large" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="35" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <g filter="url(#glow-large)" opacity="0.4">
    <path d="M -200 900 C 400 1200 1000 200 2200 700" fill="none" stroke="url(#redGrad1)" stroke-width="120" stroke-linecap="round"/>
  </g>

  <g filter="url(#glow-subtle)">
    <path d="M -100 800 C 600 1100 1100 300 2100 750" fill="none" stroke="url(#redGrad2)" stroke-width="18" stroke-linecap="round"/>
    
    <path d="M -50 850 C 500 1200 1300 400 2000 900" fill="none" stroke="url(#redGrad1)" stroke-width="4" opacity="0.8"/>
    
    <path d="M 100 650 C 400 850 900 150 2100 550" fill="none" stroke="url(#redGrad2)" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
